<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats — NRG2fly</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 0;
    }
    header {
      background: #13151f;
      border-bottom: 1px solid #1e2433;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header img {
      height: 32px;
      width: auto;
      filter: brightness(0) invert(1);
    }
    header .header-divider {
      width: 1px;
      height: 24px;
      background: #2d3748;
    }
    header .header-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .content {
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #fff;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 2.5rem;
    }
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #64748b;
      margin-bottom: 1rem;
    }
    .cards {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }
    .card {
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      min-width: 180px;
    }
    .card-label {
      font-size: 0.78rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }
    .card-value {
      font-size: 2.5rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }
    .card-value.yellow { color: #facc15; }
    table {
      width: 100%;
      max-width: 700px;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      padding: 0.6rem 1rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      border-bottom: 1px solid #2d3748;
    }
    td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #1e2433;
      color: #cbd5e1;
    }
    tr:last-child td { border-bottom: none; }
    .loading { color: #64748b; font-size: 0.85rem; }
    .refresh-btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.5rem 1.25rem;
      background: #2d3748;
      color: #e2e8f0;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .refresh-btn:hover { background: #3d4f66; }
    .updated {
      font-size: 0.75rem;
      color: #4a5568;
      margin-top: 0.75rem;
    }
  </style>
</head>
<body>
  <header>
    <img src="NRG2FLY_transparant_logo_RGB.png" alt="NRG2fly" />
    <div class="header-divider"></div>
    <span class="header-label">Whitepaper Dashboard</span>
  </header>
  <div class="content">
  <h1 style="margin-top:2rem">Whitepaper Downloads</h1>
  <p class="subtitle">Realtime data uit Supabase</p>

  <p class="section-title">Totaal</p>
  <div class="cards">
    <div class="card">
      <div class="card-label">Downloads (totaal)</div>
      <div class="card-value yellow" id="val-downloads">—</div>
    </div>
  </div>

  <p class="section-title">Downloads per whitepaper</p>
  <table>
    <thead>
      <tr>
        <th>Whitepaper</th>
        <th>Downloads</th>
      </tr>
    </thead>
    <tbody id="downloads-table">
      <tr><td colspan="2" class="loading">Laden...</td></tr>
    </tbody>
  </table>

  <p class="section-title" style="margin-top:3rem">Recente downloads</p>
  <table>
    <thead>
      <tr>
        <th>Whitepaper</th>
        <th>Datum &amp; tijd</th>
      </tr>
    </thead>
    <tbody id="recent-table">
      <tr><td colspan="2" class="loading">Laden...</td></tr>
    </tbody>
  </table>

  <button class="refresh-btn" onclick="loadStats()">Vernieuwen</button>
  <p class="updated" id="updated-at"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://fygduixgwnrvzckyjmdo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5Z2R1aXhnd25ydnpja3lqbWRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDYxMzMsImV4cCI6MjA4ODQ4MjEzM30.ZNcuzfHKpvWRJ2q5jJ-N7q8FubU7rm-sJvxixCPCdh8';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadStats() {
      const { data: downloads } = await sb
        .from('whitepaper_downloads')
        .select('whitepaper, downloaded_at')
        .order('downloaded_at', { ascending: false });

      const total = downloads ? downloads.length : 0;
      document.getElementById('val-downloads').textContent = total;

      // Per whitepaper
      const counts = {};
      (downloads || []).forEach(function(row) {
        counts[row.whitepaper] = (counts[row.whitepaper] || 0) + 1;
      });
      const tbody = document.getElementById('downloads-table');
      if (Object.keys(counts).length === 0) {
        tbody.innerHTML = '<tr><td colspan="2" style="color:#4a5568">Nog geen downloads</td></tr>';
      } else {
        tbody.innerHTML = Object.entries(counts)
          .sort(function(a, b) { return b[1] - a[1]; })
          .map(function([name, count]) {
            return '<tr><td>' + name + '</td><td>' + count + '</td></tr>';
          }).join('');
      }

      // Recent
      const recentTbody = document.getElementById('recent-table');
      const recent = (downloads || []).slice(0, 20);
      if (recent.length === 0) {
        recentTbody.innerHTML = '<tr><td colspan="2" style="color:#4a5568">Nog geen downloads</td></tr>';
      } else {
        recentTbody.innerHTML = recent.map(function(row) {
          const d = new Date(row.downloaded_at);
          const fmt = d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', year: 'numeric' })
            + ' ' + d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
          return '<tr><td>' + row.whitepaper + '</td><td>' + fmt + '</td></tr>';
        }).join('');
      }

      document.getElementById('updated-at').textContent =
        'Bijgewerkt om ' + new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    loadStats();
  </script>
</body>
</html>
